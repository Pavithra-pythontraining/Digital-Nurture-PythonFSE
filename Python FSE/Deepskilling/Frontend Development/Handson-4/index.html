<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
<h2> SEC Student Portal</h2>
<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Courses</a></li>
<li><a href="#">Profile</a></li>
<li><a href="#">Grades</a></li>
</ul>
</nav>
</header>
<main>

    <!-- Hero Section -->
    <section id="hero">

        <h1>Welcome to the Student Portal</h1>

        <p>Learn, Practice and Grow.</p>

        <button>Explore Courses</button>

    </section>

    <!-- Student Stats -->
    <section id="stats">

        <div class="stat-box">
            <h3>3</h3>
            <p>Courses Enrolled</p>
        </div>

        <div class="stat-box">
            <h3>8.8</h3>
            <p>GPA</p>
        </div>

        <div class="stat-box">
            <h3>6</h3>
            <p>Semester</p>
        </div>

    </section>

    <!-- Courses -->
    <section id="courses">

        <h2>Available Courses</h2>

        <input
            type="text"
            id="search-courses"
            placeholder="Search Courses">

        <button id="sort-btn">
            Sort By Credits
        </button>

        <div class="course-grid"></div>

        <p id="total-credits"></p>

        <div id="selected-course"></div>

    </section>
    <section id="notifications">

    <h2>Notifications</h2>

    <div id="loading">
        Loading...
    </div>

    <div id="notification-list"></div>

    <div id="error-message"></div>

    <button id="retry-btn" style="display:none;">
        Retry
    </button>

</section>

</main>
<footer>

<p>

© 2026 SEC Student Portal

</p>

<footer>

<p>© 2026 SEC Student Portal</p>

</footer>

<!-- Axios CDN -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- Your JavaScript -->
<script type="module" src="app.js"></script>

</body>
</html>
